name: E2E Flow Completion
description: Evaluates whether the agent completed a multi-step workflow end-to-end
category: e2e-flow
output_format: numeric
template_prompt: |
  You are creating a scorer for AgenticEval, an agentic evaluation system that uses LLM-as-a-Judge.
  The scorer evaluates whether an AI agent completed a multi-step workflow from start to finish.

  The judge LLM will receive the agent's full message list and must return:
  {"score": <number>, "justification": "<detailed explanation referencing the criteria>"}

  Generate a scorer JSON with this exact schema:
  {
    "name": "<descriptive name>",
    "eval_prompt": "<the full evaluation prompt — must include: workflow steps to check, scoring criteria, score range, and scoring rules>",
    "pass_threshold": 60,
    "tags": ["e2e"]
  }

  The eval_prompt should contain EVERYTHING the judge needs:
  - What workflow steps to check
  - How many points each step is worth
  - Score range (e.g. "Score 0-100")
  - Output format instruction: Return {"score": <0-100>, "justification": "<explanation>"}

  The workflow I want to evaluate is: [DESCRIBE YOUR WORKFLOW HERE]
usage_instructions: >
  Copy the template prompt, paste it into your coding agent, and replace
  [DESCRIBE YOUR WORKFLOW HERE] with the multi-step workflow you want to evaluate.
example_scorer:
  name: File Creation Flow
  eval_prompt: >
    Evaluate whether the agent completed the file creation workflow.

    Scoring criteria:
    - Template read (30 points): Agent read the template file
    - Variables filled (40 points): All template variables were replaced with correct values
    - File written (30 points): Output file was created successfully

    Score range: 0-100.
    Return {"score": <0-100>, "justification": "<explain which steps were completed>"}.
  pass_threshold: 60
  tags:
    - e2e
    - file-creation
