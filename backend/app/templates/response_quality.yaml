name: Response Quality
description: General quality rubric scoring accuracy, completeness, and helpfulness
category: response-quality
output_format: rubric
template_prompt: |
  You are creating a scorer for AgenticEval, an agentic evaluation system that uses LLM-as-a-Judge.
  The scorer uses a multi-dimensional rubric to rate the quality of an AI agent's response.

  The judge LLM will receive the agent's full message list and must return:
  {"score": <number>, "justification": "<detailed explanation>"}

  Generate a scorer JSON with this exact schema:
  {
    "name": "<descriptive name>",
    "eval_prompt": "<the full evaluation prompt — must include: dimensions to rate, scale for each, how to compute overall score, and scoring rules>",
    "pass_threshold": 3.0,
    "tags": ["quality"]
  }

  The eval_prompt should contain EVERYTHING the judge needs:
  - Dimensions to evaluate (e.g. correctness, completeness, helpfulness)
  - Scale for each dimension (e.g. 1-5)
  - How to compute overall score (e.g. average of dimensions)
  - Output format instruction: Return {"score": <overall>, "justification": "<per-dimension assessment>"}

  The task I want to evaluate responses for is: [DESCRIBE YOUR TASK HERE]
usage_instructions: >
  Copy the template prompt, paste it into your coding agent, and replace
  [DESCRIBE YOUR TASK HERE] with the task whose response quality you want to evaluate.
example_scorer:
  name: General Response Quality
  eval_prompt: >
    Rate the agent's response on each dimension (1-5 scale):

    Dimensions:
    - Correctness: Is the response factually accurate? (1=completely wrong, 5=perfectly correct)
    - Completeness: Does the response address all parts of the request? (1=missed everything, 5=fully addressed)
    - Helpfulness: Is the response useful and actionable? (1=useless, 5=extremely helpful)

    Overall score = average of all dimensions.
    Return {"score": <average 1-5>, "justification": "<explain each dimension score>"}.
  pass_threshold: 3.0
  tags:
    - quality
    - general
