name: Tool Call Correctness
description: Evaluates whether the agent called the correct tool with the right parameters
category: tool-correctness
template_prompt: |
  You are creating a scorer for AgenticEval, an agentic evaluation system that uses LLM-as-a-Judge.
  The scorer evaluates whether an AI agent called the correct tool with the correct parameters.

  The judge LLM will receive the agent's full message list (including tool calls) and must return:
  {"score": <number>, "justification": "<detailed explanation referencing the criteria>"}

  Generate a scorer JSON with this exact schema:
  {
    "name": "<descriptive name for your eval>",
    "eval_prompt": "<the full evaluation prompt — must include: what to evaluate, scoring criteria, score range, and scoring rules>",
    "pass_threshold": 60,
    "tags": ["tool"]
  }

  The eval_prompt should contain EVERYTHING the judge needs:
  - What to evaluate (e.g. "check if the agent called the correct tool")
  - Scoring criteria (e.g. "correct tool name: 50 points, correct params: 50 points")
  - Score range (e.g. "Score 0-100")
  - Output format instruction: Return {"score": <0-100>, "justification": "<explanation>"}

  The tool I want to evaluate is: [DESCRIBE YOUR TOOL HERE]
usage_instructions: >
  Copy the template prompt, paste it into your coding agent, and replace
  [DESCRIBE YOUR TOOL HERE] with a description of the specific tool you want to evaluate.
  The generated scorer will produce a 0-100 score with detailed justification.
example_scorer:
  name: Search Tool Correctness
  eval_prompt: >
    Evaluate whether the agent called the search tool correctly.

    Scoring criteria:
    - Correct tool called (50 points): Agent called the 'search' tool, not a different tool
    - Correct parameters (50 points): Query parameter matches the expected search term

    Score range: 0-100.
    Return {"score": <0-100>, "justification": "<explain which criteria were met/missed>"}.
  pass_threshold: 60
  tags:
    - tool
    - search
